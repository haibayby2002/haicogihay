<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiết sản phẩm — Hải có gì hay?</title>
  <link rel="icon" href="{icon_url}" type="image/png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="product.css">
  
</head>
<body>
  <nav class="site-nav">
    <button class="burger-menu" id="burger-btn" aria-label="Toggle navigation">
      ☰
  </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="../index.html">Trang chủ</a></li>
      <li><a href="../index.html#products">Sản phẩm</a></li>
      <!-- <li><a href="../index.html#about">Về chúng tôi</a></li> -->
      <li><a href="../index.html#faqs">Câu hỏi thường gặp</a></li>
      <li><a href="../index.html#footer">Liên hệ</a></li>
    </ul>
  </nav>
  <main class="container">
    <div id="productDetailRoot"></div>
  </main>
  <footer id="footer">
    <div class="container footer-content">
      <div class="footer-info">
        <h2>Thông tin liên hệ</h2>
        <p>Email: <a href="mailto:nguyenquyhai2002@gmail.com">nguyenquyhai2002@gmail.com</a></p>
        <p>Phone: <a href="tel:+84703017645">+84 703 017 645</a></p>
        <p>Zalo: <a href="https://zalo.me/0703017645" target="_blank" rel="noreferrer noopener">https://zalo.me/0703017645</a></p>
        <div class="footer-socials"></div>
      </div>
      <div class="footer-cta"></div>
    </div>
  </footer>
  <a class="zalo-button" href="https://zalo.me/0703016645" target="_blank" rel="noreferrer noopener" aria-label="Contact on Zalo">
    <img src="../assets/store_image/Logo-Zalo-Arc.webp" alt="" width="64" height="64">
  </a>
  <div class="zalo-bubble">Ready to buy? Contact us on Zalo!</div>
  <script>
    const storeData = {storeData};
    const product = {product};



    function getLinkImg(src) {
      if (!src) return '';
      if (src.startsWith('http://') || src.startsWith('https://')) {
        return src;
      }
      return `{home_url}${src}`;
    }

    function formatMoney(value) {
      const num = typeof value === 'number' ? value : parseFloat(String(value).replace(/[^0-9.-]+/g, ''));
      if (Number.isNaN(num)) return String(value);
      return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'USD', maximumFractionDigits: 2 }).format(num);
    }

    function formatPrice(value) {
      const num = typeof value === 'number' ? value : parseFloat(String(value).replace(/[^0-9.-]+/g, ''));
      if (Number.isNaN(num)) return String(value);
      return num.toLocaleString('vi-VN', { style: 'currency', currency: 'VND' });
    }

    function uniqueGalleryImages(p) {
      const list = [p.image, ...(Array.isArray(p.more_images) ? p.more_images : [])].filter(Boolean);
      return [...new Set(list)];
    }

    function renderProductDetail() {
      const root = document.getElementById('productDetailRoot');
      if (!root || !product || typeof product.id === 'undefined') {
        if (root) {
          root.innerHTML = '<p class="product-detail-description">Không tìm thấy sản phẩm.</p>';
        }
        return;
      }

      document.title = `${product.name} — ${storeData.brand?.name || 'Hải có gì hay?'}`;

      const images = uniqueGalleryImages(product);
      const thumbsHtml = images.length > 1
        ? `<div class="product-detail-thumbs" role="tablist" aria-label="Ảnh sản phẩm">
            ${images.map((src, i) => `
              <button type="button" class="${i === 0 ? 'is-active' : ''}" data-src="${getLinkImg(src)}" aria-label="Xem ảnh ${i + 1}" aria-selected="${i === 0}">
                <img src="${getLinkImg(src)}" alt="" width="72" height="72" loading="lazy" />
              </button>
            `).join('')}
           </div>`
        : '';

      root.innerHTML = `
        <nav class="product-detail-breadcrumb" aria-label="Breadcrumb">
          <a href="{home_url}/index.html#products">Sản phẩm</a>
          <span aria-hidden="true"> / </span>
          <span>${product.name}</span>
        </nav>
        <article class="product-detail">
          <div class="product-detail-gallery">
            <img id="productMainImage" class="product-detail-main-img" src="${getLinkImg(images[0])}" alt="${product.name}"/>
            ${thumbsHtml}
          </div>
          <div class="product-detail-info">
            <span class="product-detail-category">${product.category}</span>
            <h1>${product.name}</h1>
            <div class="product-detail-prices">
              <span class="price-was">${formatPrice(product.price)}</span>
              <span class="sale-price">${formatPrice(product.sale_price)}</span>
            </div>
            <p class="product-detail-description">${product.description}</p>
            <div class="product-detail-tags">
              ${(product.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
            <div class="product-detail-actions">
              <a id="productZaloCta" class="cta-button" href="#" target="_blank" rel="noreferrer noopener">
                <i class="fas fa-comments" aria-hidden="true"></i> Liên hệ đặt hàng qua Zalo
              </a>
            </div>
          </div>
        </article>
      `;

      const mainImg = document.getElementById('productMainImage');
      document.querySelectorAll('.product-detail-thumbs button').forEach(btn => {
        btn.addEventListener('click', () => {
          if (mainImg) mainImg.src = btn.getAttribute('data-src');
          document.querySelectorAll('.product-detail-thumbs button').forEach(b => {
            b.classList.toggle('is-active', b === btn);
            b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
          });
        });
      });

      const buy = storeData.cta?.buy;
      const zaloBtn = document.getElementById('productZaloCta');
      if (zaloBtn && buy?.link) zaloBtn.href = buy.link;
    }

    function renderZaloBuy() {
      const buy = storeData.cta?.buy;
      const zaloButton = document.querySelector('.zalo-button');
      if (zaloButton && buy?.link) zaloButton.href = buy.link;
      const zaloBubble = document.querySelector('.zalo-bubble');
      if (zaloBubble && buy?.call) zaloBubble.textContent = buy.call;
    }

    function renderSocialLinks() {
      const socialLinksContainer = document.querySelector('.footer-socials');
      if (!socialLinksContainer) return;
      const socialLinks = storeData.social_links || {};
      const icons = {
        facebook: 'fab fa-facebook-f',
        tiktok: 'fab fa-tiktok',
        youtube: 'fab fa-youtube',
        instagram: 'fab fa-instagram',
        twitter: 'fab fa-twitter'
      };
      socialLinksContainer.innerHTML = Object.entries(socialLinks).map(([platform, url]) => `
        <a href="${url}" class="social-icon ${icons[platform] || ''}" target="_blank" rel="noreferrer noopener" aria-label="${platform.charAt(0).toUpperCase() + platform.slice(1)}"></a>
      `).join('');
    }

    function renderFooterCTA() {
      const footerCTA = document.querySelector('.footer-cta');
      if (!footerCTA || !storeData.cta) return;
      const subscribe = storeData.cta.subscribe;
      const collaborate = storeData.cta.collaborate;
      footerCTA.innerHTML = `
        <h2>Quan tâm cửa hàng</h2>
        <p>${subscribe.call}</p>
        <p style="margin-top: 20px;">${collaborate.call}</p>
        <ul class="footer-cta-list" style="margin-top: 20px; list-style: none; padding: 0;">
          <li><a class="cta-button" href="${subscribe.link}" target="_blank" rel="noreferrer noopener">${subscribe.action}</a></li>
          <li><a class="cta-button" href="${collaborate.link}" target="_blank" rel="noreferrer noopener">${collaborate.action}</a></li>
        </ul>
      `;
    }
    
    function renderSiteNav() {
      const navLinks = document.querySelectorAll('.site-nav a');
      const currentHash = window.location.hash;
      navLinks.forEach(link => {
        if (link.getAttribute('href') === currentHash) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    }

    const burgerBtn = document.getElementById('burger-btn');
    const navLinks = document.getElementById('nav-links');

    burgerBtn.addEventListener('click', () => {
      navLinks.classList.toggle('active');
    });

    renderSiteNav();
    renderProductDetail();
    renderZaloBuy();
    renderSocialLinks();
    renderFooterCTA();
  </script>
</body>
</html>
